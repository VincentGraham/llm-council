      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 120s
    restart: unless-stopped
  mistral-large-instruct:
    image: nvcr.io/nim/mistralai/mistral-large-instruct:latest
    container_name: nim-mistral-large-instruct
