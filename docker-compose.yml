services:
  llama-3-3-nemotron-super-49b-v1-5:
    image: nvcr.io/nim/nvidia/llama-3.3-nemotron-super-49b-v1.5:latest
    container_name: nim-llama-3-3-nemotron-super-49b-v1-5
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
          - driver: nvidia
            capabilities:
            - gpu
            device_ids:
            - '0'
            - '1'
    environment:
    - NGC_API_KEY=${NGC_API_KEY}
    - NVIDIA_VISIBLE_DEVICES=0,1
    - NIM_INFERENCE_BACKEND=vllm
    - NIM_CACHE_PATH=/opt/nim/.cache
    - HF_HOME=/opt/nim/.cache/huggingface
    - TRANSFORMERS_CACHE=/opt/nim/.cache/huggingface
    volumes:
    - /data/nim-cache:/opt/nim/.cache
    ports:
    - 8011:8000
    healthcheck:
      test:
      - CMD-SHELL
      - curl -fsS http://localhost:8000/v1/models || exit 1
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 120s
    restart: unless-stopped
